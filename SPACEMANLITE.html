<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTROMAN V3: ANTI-STUCK</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; font-family: 'Press Start 2P', cursive; }
        body { background: #020617; color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #0f172a; padding: 10px; display: flex; justify-content: space-between; font-size: 0.4em; border-bottom: 2px solid #3b82f6; }
        .history-section { width: 100%; background: #000; padding: 8px 15px; border-bottom: 1px solid #333; overflow-x: auto; display: flex; gap: 8px; min-height: 40px; }
        .h-item { font-size: 0.35em; padding: 4px 8px; border: 1px solid #444; flex-shrink: 0; }
        #game-area { position: relative; width: 100%; height: 40vh; background: radial-gradient(circle at bottom, #1e1b4b, #020617); overflow: hidden; border-bottom: 4px solid #334155; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; text-shadow: 0 0 20px #3b82f6; z-index: 5; text-align: center; }
        #round-info { position: absolute; top: 10%; width: 100%; text-align: center; font-size: 0.4em; color: #fbbf24; }
        #spaceman-wrapper { position: absolute; bottom: 40px; left: 40px; font-size: 40px; transition: 0.1s linear; }
        .controls { width: 100%; max-width: 400px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { border: none; border-radius: 8px; padding: 12px; font-size: 0.5em; cursor: pointer; text-transform: uppercase; color: #fff; }
        #btn-bet { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; width: 100%; }
        #btn-bet:disabled { background: #475569; opacity: 0.6; box-shadow: none; }
        .cash-grid { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { background: #000; border: 2px solid #3b82f6; color: #fff; padding: 12px; width: 100%; margin: 10px 0; font-size: 0.5em; border-radius: 5px; }
        #login-screen { position:fixed; inset:0; background:#0f172a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:#3b82f6; font-size:0.7em; margin-bottom:20px;">ASTROMAN V3</h2>
        <input type="text" id="nick-in" placeholder="NAMA KAMU...">
        <button class="btn" style="background:#22c55e; padding:15px 40px;" onclick="login()">MULAI</button>
    </div>

    <div class="header">
        <div>ID: <span id="u-id">?</span></div>
        <div>💰: <span id="u-bal">0</span></div>
    </div>
    <div class="history-section" id="h-list"></div>
    <div id="game-area">
        <div id="round-info">SIAP...</div>
        <div id="multiplier">1.00x</div>
        <div id="spaceman-wrapper">👨‍🚀</div>
    </div>

    <div class="controls">
        <input type="number" id="bet-amount" value="100">
        <button id="btn-bet" class="btn" onclick="placeBet()">PASANG TARUHAN</button>
        <div class="cash-grid" id="cash-area">
            <button class="btn" style="background:#f59e0b;" onclick="cashout(50)">50%</button>
            <button class="btn" style="background:#22c55e;" onclick="cashout(100)">100%</button>
        </div>
    </div>

<script>
    // KONFIGURASI DATABASE KAMU
    const firebaseConfig = { databaseURL: "https://astroman-2f7c7-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myNick = "", myBalance = 0, currentBet = 0, isMaster = false;
    let isFlying = false, hasBet = false, hasTaken100 = false;

    function login() {
        myNick = document.getElementById('nick-in').value.trim().toUpperCase();
        if(!myNick) return;
        
        db.ref('users/' + myNick).once('value', (s) => {
            if(!s.exists()) {
                db.ref('users/' + myNick).set({ balance: 5000 });
                myBalance = 5000;
            } else {
                myBalance = s.val().balance;
            }
            document.getElementById('u-id').innerText = myNick;
            document.getElementById('login-screen').style.display = 'none';
            
            // Pantau saldo
            db.ref('users/' + myNick + '/balance').on('value', snap => {
                myBalance = snap.val() || 0;
                document.getElementById('u-bal').innerText = myBalance.toLocaleString();
            });

            startEngine();
        });
    }

    function startEngine() {
        // --- LOGIKA MASTER AUTO-STEER ---
        const masterRef = db.ref('game/master');
        masterRef.onDisconnect().remove(); 

        masterRef.on('value', (s) => {
            if (!s.exists()) {
                masterRef.set(myNick);
                isMaster = true;
            } else if (s.val() === myNick) {
                isMaster = true;
            } else {
                isMaster = false;
            }
        });

        // Sync Data Game
        db.ref('game/state').on('value', (s) => {
            const state = s.val() || { isFlying: false, countdown: 10 };
            isFlying = state.isFlying;
            if(!isFlying) {
                resetUI();
                document.getElementById('round-info').innerText = `MULAI: ${state.countdown}s`;
            } else {
                document.getElementById('round-info').innerText = "FLYING!";
            }
        });

        db.ref('game/currentMult').on('value', (s) => {
            let m = s.val() || 1.00;
            document.getElementById('multiplier').innerText = m.toFixed(2) + "x";
            let y = (m - 1) * 35; let x = (m - 1) * 10;
            document.getElementById('spaceman-wrapper').style.transform = `translate(${x}px, -${y}px)`;
        });

        db.ref('game/history').limitToLast(10).on('value', (s) => {
            const list = document.getElementById('h-list'); list.innerHTML = "";
            if(s.exists()) {
                let items = []; s.forEach(c => { items.unshift(c.val()); });
                items.forEach(v => {
                    const el = document.createElement('div'); el.className = 'h-item';
                    el.style.color = v >= 2 ? "#22c55e" : "#ef4444";
                    el.innerText = parseFloat(v).toFixed(2) + "x"; list.appendChild(el);
                });
            }
        });
    }

    // INTERVAl ENGINE (HANYA MASTER YANG JALANKAN)
    setInterval(() => {
        if (isMaster) {
            db.ref('game/state').once('value', (s) => {
                const state = s.val() || { isFlying: false, countdown: 10 };
                if (!state.isFlying) {
                    if (state.countdown > 0) {
                        db.ref('game/state/countdown').set(state.countdown - 1);
                    } else {
                        runRound();
                    }
                }
            });
        }
    }, 1000);

    function runRound() {
        // Ledakan random
        let cp = Math.random() < 0.15 ? 1.00 : (Math.random() < 0.7 ? Math.random()*3+1.1 : Math.random()*20+5);
        db.ref('game/state/isFlying').set(true);
        
        let cur = 1.00;
        let timer = setInterval(() => {
            cur += 0.01;
            db.ref('game/currentMult').set(parseFloat(cur.toFixed(2)));
            if (cur >= cp) {
                clearInterval(timer);
                db.ref('game/history').push(cur);
                db.ref('game/state').set({ isFlying: false, countdown: 10 });
                db.ref('game/currentMult').set(1.00);
            }
        }, 80); // Speed dipercepat biar seru
    }

    function placeBet() {
        let amt = parseInt(document.getElementById('bet-amount').value);
        if(amt > myBalance || isFlying || hasBet) return;
        currentBet = amt;
        db.ref('users/' + myNick + '/balance').set(myBalance - amt);
        hasBet = true;
        document.getElementById('btn-bet').innerText = "TERPASANG";
        document.getElementById('btn-bet').disabled = true;
    }

    function cashout(p) {
        if(!isFlying || hasTaken100) return;
        db.ref('game/currentMult').once('value', (s) => {
            let m = s.val();
            let win = Math.floor((p === 50 ? currentBet/2 : currentBet) * m);
            db.ref('users/' + myNick + '/balance').set(myBalance + win);
            if(p === 100) { hasTaken100 = true; document.getElementById('cash-area').style.display = 'none'; }
            else { currentBet /= 2; }
        });
    }

    function resetUI() {
        hasBet = false; hasTaken100 = false;
        document.getElementById('btn-bet').style.display = 'block';
        document.getElementById('btn-bet').disabled = false;
        document.getElementById('btn-bet').innerText = "PASANG TARUHAN";
        document.getElementById('cash-area').style.display = 'none';
        document.getElementById('spaceman-wrapper').style.transform = `translate(0,0)`;
    }
</script>
</body>
</html>
